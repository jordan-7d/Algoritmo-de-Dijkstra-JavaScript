<!DOCTYPE html>
<html lang="es">

<html lang="es"> <!-- lang="es" ayuda al navegador/lector de pantalla a saber que el contenido está en español -->
<head>
  <meta charset="UTF-8" /> <!-- permite usar tildes, ñ, etc. sin que se vean mal -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- hace la página responsive en celulares -->
  <title>Algoritmo de Dijkstra - UTC (Cytoscape)</title>
  <link rel="stylesheet" href="style.css" /> <!-- carga los estilos del proyecto -->
  <!-- Cytoscape.js: librería que dibuja el grafo y maneja clics/arrastre por nosotros -->
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
</head>
<body>

  <!-- Encabezado del proyecto -->
  <header>
    <h1>Algoritmo de Dijkstra</h1>
    <p>Universidad Técnica de Cotopaxi · Programación Avanzada</p>
  </header>

  <main> <!-- contenedor flex que pone los dos paneles uno junto al otro -->

    <!-- Panel izquierdo: controles del grafo y del cálculo -->
    <section class="panel" id="panelGrafo">

      <!-- Bloque 1: construcción del grafo (todo el trabajo real ocurre con clics en el panel derecho) -->
      <h2>1. Construye el grafo</h2>
      <button id="btnReiniciar" class="secundario">🗑 Limpiar todo</button> <!-- borra todos los nodos y aristas del grafo -->

      <hr /> <!-- separador visual entre secciones -->

      <!-- Bloque 2: cálculo de la ruta más corta -->
      <h2>2. Calcular ruta</h2>

      <div class="fila">
        <label for="inputInicio">Nodo inicio:</label>
        <input type="text" id="inputInicio" placeholder="Ej: A" /> <!-- nombre del nodo donde empieza la búsqueda -->
      </div>

      <div class="fila">
        <label for="inputDestino">Nodo destino:</label>
        <input type="text" id="inputDestino" placeholder="Ej: D" /> <!-- nombre del nodo al que se quiere llegar -->
      </div>

      <button id="btnCalcular">Calcular ruta más corta</button> <!-- dispara el algoritmo de Dijkstra en app.js -->

      <hr />

      <!-- Bloque 3: resultado del camino más corto -->
      <h3>Camino más corto</h3>
      <p id="textoCamino">—</p> <!-- app.js reemplaza este texto con el camino y la distancia total -->
    </section>

    <!-- Panel derecho: lienzo interactivo donde vive el grafo (Cytoscape) -->
    <section class="panel" id="panelResultado">
      <h2>Grafo interactivo</h2>
      <div id="cy"></div> <!-- Cytoscape "engancha" el grafo a este div y lo dibuja adentro -->
    </section>
  </main>

  <!-- Modal emergente: pide el peso de una arista al conectar dos nodos -->
  <div id="modalPeso" class="modal oculto"> <!-- clase "oculto" lo mantiene invisible hasta que app.js lo active -->
    <div class="modal-caja">
      <p>Peso de la conexión <strong id="modalLabel"></strong>:</p> <!-- muestra "A → B" según los nodos elegidos -->
      <input type="number" id="modalInput" min="1" placeholder="Ej: 5" /> <!-- aquí el usuario escribe el peso de la arista -->
      <div>
        <button id="modalConfirmar">Confirmar</button> <!-- guarda la arista con el peso ingresado -->
        <button id="modalCancelar" class="secundario">Cancelar</button> <!-- cierra el modal sin crear la arista -->
      </div>
    </div>
  </div>

  <!-- dijkstra.js debe ir antes que app.js: app.js usa sus funciones -->
  <script src="dijkstra.js"></script>
  <script src="app.js"></script>
</body>
</html>
